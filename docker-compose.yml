services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DB_PATH: /data/crm.db
    volumes:
      - db-data:/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
